# podman-compose up -d  (or docker-compose up -d — both work)
services:
  # Backend API
  backend:
    image: manas2821/k8s-platform-backend:latest
    container_name: k8s-opt-backend
    # ports removed — backend is internal only, accessed via Nginx on /api/*
    expose:
      - "8000"
    env_file:
      - ./backend/.env
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "false"
      ENVIRONMENT: production
      # Application Settings
      APP_NAME: Kubernetes Optimization Platform
      API_VERSION: 1.0.0
      # Database Settings
      DATABASE_POOL_SIZE: 10
      DATABASE_MAX_OVERFLOW: 20
      # Redis Settings
      REDIS_CACHE_TTL: 3600
      # Kubernetes Settings - UPDATED FOR REAL CLUSTER ACCESS
      K8S_IN_CLUSTER: "false"
      K8S_CONFIG_PATH: /root/.kube/config
      K8S_CONTEXT: xforce-devops/c2dvjirw01r66qf58vu0
      # Cost Calculation (AWS pricing)
      CPU_COST_PER_CORE_HOUR: 0.031
      MEMORY_COST_PER_GB_HOUR: 0.004
      STORAGE_COST_PER_GB_MONTH: 0.10
      # Carbon Footprint
      CARBON_PER_KWH: 0.35
      CPU_WATTS_PER_CORE: 10.0
      MEMORY_WATTS_PER_GB: 0.375
      # Trivy scanner settings
      TRIVY_MAX_CONCURRENT: "5"
      TRIVY_TIMEOUT: "150"
      TRIVY_CACHE_TTL: "21600"
      # Optimization Settings
      CPU_BUFFER_PERCENTAGE: 20.0
      MEMORY_BUFFER_PERCENTAGE: 20.0
      MIN_RECOMMENDATION_CONFIDENCE: 0.7
      LOOKBACK_DAYS: 7
      # Auto-fix Settings
      AUTO_FIX_ENABLED: "true"
      AUTO_FIX_DRY_RUN: "false"
      AUTO_FIX_MAX_BATCH_SIZE: 10
      # Cleanup Settings
      CLEANUP_UNUSED_DAYS: 90
      CLEANUP_SAFE_DELETE_ENABLED: "true"
      # Monitoring
      METRICS_COLLECTION_INTERVAL: 300
      # Logging
      LOG_LEVEL: INFO
      LOG_FORMAT: json
      # Security & Authentication
      SECRET_KEY: change-this-in-production-to-a-secure-random-string
      JWT_SECRET_KEY: k8s-opt-jwt-secret-key-change-in-production-2024
      JWT_ALGORITHM: HS256
      JWT_EXPIRATION_MINUTES: 60
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      # Rate Limiting
      RATE_LIMIT_PER_MINUTE: 60
      # CORS
      CORS_ORIGINS: http://localhost:3000,http://localhost:8000,http://k8s-opt-frontend:80,http://k8s-opt-frontend,https://k8s-6d5ba.web.app,https://k8s-6d5ba.firebaseapp.com
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/data
      # Mount kubeconfig and IBM Cloud CA certs for real cluster access
      - ${HOME}/.kube:/root/.kube:rw
      - ${HOME}/.bluemix:/root/.bluemix:ro
    restart: unless-stopped
    networks:
      - k8s-opt-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker
  worker:
    image: manas2821/k8s-platform-backend:latest
    container_name: k8s-opt-worker
    command: >
      celery -A celery_app worker
      --loglevel=info
      --concurrency=4
      --queues=celery
      --hostname=worker@%h
    env_file:
      - ./backend/.env
    environment:
      PROMETHEUS_URL: http://prometheus:9090
      K8S_IN_CLUSTER: "false"
      K8S_CONFIG_PATH: /root/.kube/config
      K8S_CONTEXT: xforce-devops/c2dvjirw01r66qf58vu0
      LOG_LEVEL: INFO
    volumes:
      - backend_logs:/app/logs
      - backend_data:/app/data
      - ${HOME}/.kube:/root/.kube:rw
      - ${HOME}/.bluemix:/root/.bluemix:ro
    restart: unless-stopped
    networks:
      - k8s-opt-network
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_app inspect ping -d worker@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s

  # Frontend React App
  frontend:
    image: manas2821/k8s-platform-frontend:latest
    container_name: k8s-opt-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - k8s-opt-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: k8s-opt-prometheus
    # ports removed — prometheus is internal only
    # access via: docker exec or through Grafana datasource
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - k8s-opt-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: k8s-opt-grafana
    # ports removed — grafana is internal only, access via Nginx /grafana/* route
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://YOUR_DOMAIN/grafana
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - k8s-opt-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  backend_logs:
    driver: local
  backend_data:
    driver: local

networks:
  k8s-opt-network:
    driver: bridge
    enable_ipv6: true
    ipam:
      config:
        - subnet: "172.18.0.0/16"
        - subnet: "2600:1f18:24fb:6d00:2::/80"

# Made with Bob - podman-compose / docker-compose compatible
